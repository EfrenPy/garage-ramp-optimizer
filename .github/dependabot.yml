version: 2
updates:
  # Keep Python dependencies (declared in requirements.txt) up to date.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: "scope"
    # Bundle every pip update into a single PR so a weekly run produces
    # one notification instead of one-per-dependency.
    groups:
      python-dependencies:
        patterns:
          - "*"

  # Keep GitHub Actions versions up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    # Bundle every GitHub Actions bump into a single PR.  This is what
    # previously caused the email flood: ~9 separate action bumps each
    # opened their own PR and each failing check emailed individually.
    groups:
      github-actions:
        patterns:
          - "*"
