name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax-and-lint:
    name: Syntax + lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          # No pip cache: the GitHub Actions cache fills up our quota
          # quickly, and a fresh "pip install -r requirements.txt" is
          # only ~30 s on the warm runners we use.

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ".[dev]"

      - name: Syntax check
        run: |
          python -m py_compile ramp_optimizer.py build_exe.py
          if [ -d src ]; then
            python -m compileall -q src
          fi

      - name: Import smoke test
        run: |
          python -c "import ramp_optimizer; print('imports OK')"

      - name: Ruff lint
        run: ruff check .

      - name: mypy (advisory, not blocking)
        continue-on-error: true
        run: mypy ramp_optimizer.py

      - name: Run tests with coverage
        run: |
          if [ -d tests ] && ls tests/test_*.py >/dev/null 2>&1; then
            python -m pytest -q \
              --cov \
              --cov-report=term-missing \
              --cov-report=xml
          else
            echo "No tests directory yet, skipping."
          fi

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
