name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax-and-lint:
    name: Syntax + lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff pytest

      - name: Syntax check
        run: |
          python -m py_compile ramp_optimizer.py build_exe.py
          if [ -d src ]; then
            python -m compileall -q src
          fi

      - name: Import smoke test
        run: |
          python -c "import ramp_optimizer; print('imports OK')"

      - name: Ruff lint
        run: ruff check .

      - name: Run tests
        run: |
          if [ -d tests ] && ls tests/test_*.py >/dev/null 2>&1; then
            python -m pytest -q
          else
            echo "No tests directory yet, skipping."
          fi
