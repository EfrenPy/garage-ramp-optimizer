name: Release

# Builds Windows executables (English + Spanish) and publishes them
# to a GitHub Release.  Three entry points:
#
#   1.  push of a tag matching `v*` -- happens after a manual `git
#       push origin v0.X.0` outside the release-please flow.
#   2.  workflow_dispatch from the Actions tab -- handy when you want
#       to rebuild an existing tag's binaries.
#   3.  workflow_call -- used by release-please.yml to chain the
#       build right after a release-please-created tag, without
#       relying on cross-workflow GITHUB_TOKEN triggers (which
#       GitHub disables for security).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0)."
        required: true
  workflow_call:
    inputs:
      tag:
        description: "Tag to publish."
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows-exe:
    name: Build Windows .exe (${{ matrix.label }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: en
            label: English
            extra_args: ""
            outname: rampa-en.exe
          - lang: es
            label: Spanish
            extra_args: "--spanish"
            outname: rampa-es.exe
    steps:
      - name: Resolve target tag
        id: tag
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.event.inputs.tag || github.ref_name }}"
          echo "value=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building tag: $TAG"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.value }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          # No pip cache: avoids burning Actions cache quota on each
          # release build.

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build executable (${{ matrix.label }})
        run: python build_exe.py ${{ matrix.extra_args }}

      - name: Rename and verify executable
        shell: pwsh
        run: |
          Copy-Item dist/rampa.exe ${{ matrix.outname }}
          Get-ChildItem ${{ matrix.outname }} | Format-List Length, Name

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.outname }}
          path: ${{ matrix.outname }}
          if-no-files-found: error
          # The artifacts only need to live long enough for the
          # sign-windows-exe / publish-release jobs in the same workflow
          # run to pick them up and attach them to the GitHub Release.
          # We delete them explicitly at the end of publish-release; the
          # 1-day retention is just a fallback if the run aborts mid-way.
          retention-days: 1
          compression-level: 9

  # ---------------------------------------------------------------------
  # SignPath Foundation code-signing.  Inserted between build and
  # publish so the binaries attached to the GitHub Release are signed
  # with the SignPath Authenticode certificate -- removing the
  # "Windows protected your PC" SmartScreen overlay.
  #
  # Application + approval steps are documented in docs/SIGNPATH.md.
  # Three things must be true before this job will work:
  #   1.  SignPath has approved the project and emailed the maintainer
  #       with the Organisation ID, Project Slug and Signing-Policy Slug.
  #   2.  A repository secret named `SIGNPATH_API_TOKEN` exists with the
  #       CI user API token from the same email.
  #   3.  The TODO placeholders below have been replaced with the real
  #       values.
  #
  # Until those three items are in place, this job will fail; that is
  # intentional -- the staged branch (`signpath/wire-up`) is *not*
  # supposed to be merged to `main` before SignPath approves.
  # ---------------------------------------------------------------------
  sign-windows-exe:
    name: Sign Windows .exe (${{ matrix.outname }})
    needs: build-windows-exe
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # required by SignPath's GitHub OIDC trust
    strategy:
      fail-fast: false
      matrix:
        outname: [rampa-en.exe, rampa-es.exe]
    steps:
      - name: Download unsigned build artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.outname }}
          path: unsigned

      - name: Submit signing request to SignPath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token:            ${{ secrets.SIGNPATH_API_TOKEN }}
          # TODO(signpath): replace with the Organisation ID emailed by
          # SignPath after approval (UUID, e.g. abc12345-6789-...).
          organization-id:      00000000-0000-0000-0000-000000000000
          # TODO(signpath): replace with the project slug SignPath
          # assigned to this project (typically `garage-ramp-optimizer`).
          project-slug:         garage-ramp-optimizer
          # TODO(signpath): replace with the signing-policy slug
          # SignPath created (typically `release-signing`; some orgs
          # ship `test-signing` for pre-release tags too).
          signing-policy-slug:  release-signing
          github-artifact-name: ${{ matrix.outname }}
          wait-for-completion:  true
          output-artifact-directory: signed

      - name: Upload signed artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.outname }}-signed
          path: signed/${{ matrix.outname }}
          if-no-files-found: error
          retention-days: 1
          compression-level: 9

  publish-release:
    name: Publish GitHub Release
    needs: sign-windows-exe
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Resolve target tag
        id: tag
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.event.inputs.tag || github.ref_name }}"
          echo "value=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.value }}

      - name: Download signed artifacts
        uses: actions/download-artifact@v8
        with:
          # Only the SignPath-signed copies should land on the Release.
          # The raw `rampa-*.exe` artifacts from build-windows-exe are
          # deliberately ignored here -- they exist purely as the input
          # to sign-windows-exe.
          pattern: "*.exe-signed"
          path: signed-artifacts
          merge-multiple: false

      - name: Flatten signed artifacts into release-ready files
        # The signed artifacts arrive as `signed-artifacts/<name>-signed/<name>`.
        # softprops/action-gh-release wants flat paths, so move each
        # signed .exe up to `artifacts/<name>` -- the same final layout
        # we used pre-signing, keeping the release notes unchanged.
        run: |
          set -euo pipefail
          mkdir -p artifacts
          for outname in rampa-en.exe rampa-es.exe; do
            src="signed-artifacts/${outname}-signed/${outname}"
            if [[ ! -f "$src" ]]; then
              echo "ERROR: expected signed artifact missing: $src" >&2
              ls -R signed-artifacts/ >&2 || true
              exit 1
            fi
            cp -v "$src" "artifacts/${outname}"
          done

      - name: List collected files
        run: ls -la artifacts/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            artifacts/rampa-en.exe
            artifacts/rampa-es.exe
          body: |
            Pre-built Windows executables for the **garage ramp optimizer**.

            | File | UI language | Notes |
            |---|---|---|
            | `rampa-en.exe` | English | default |
            | `rampa-es.exe` | Spanish | the GUI, console output and blueprints are in Spanish |

            ### How to use

            1. Download one of the executables above.
            2. Double-click it. The GUI opens — fill in the rise, run
               and (if you want) the car parameters, then click
               **Calculate and generate blueprints**.
            3. The PNG / PDF blueprints and the CSV tables land in the
               folder you pick (next to the `.exe` by default).

            See [`README.md`](https://github.com/EfrenPy/garage-ramp-optimizer#readme)
            for the full guide and
            [`COMPILAR.md`](https://github.com/EfrenPy/garage-ramp-optimizer/blob/main/COMPILAR.md)
            if you want to build the executable yourself.

            ### Code signature

            Both executables are code-signed by
            [SignPath Foundation](https://signpath.org/) on every
            release.  Right-click the `.exe` ▸ Properties ▸
            **Digital Signatures** to inspect the certificate chain
            (issuer: *SignPath Foundation*, signed subject:
            *garage-ramp-optimizer*).  See
            [`README.md` ▸ Verifying the Windows signature](https://github.com/EfrenPy/garage-ramp-optimizer#verifying-the-windows-signature)
            for the full check.

            ### Antivirus note

            Some antiviruses flag any uncommon `.exe` by reputation,
            even after signing.  Workarounds: add the file to your
            antivirus' exclusion list, or run the Python script
            directly without compiling — see
            [`CONTRIBUTING.md`](https://github.com/EfrenPy/garage-ramp-optimizer/blob/main/CONTRIBUTING.md).

      - name: Delete intermediate workflow artifacts
        # The .exe files now live on the GitHub Release itself, so the
        # workflow-run artifacts are pure waste of Actions storage.
        # Delete them explicitly so we do not depend on the (slow)
        # retention-days expiry to free space.
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          echo "Listing artifacts for run ${{ github.run_id }}..."
          IDS=$(gh api -X GET \
            "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[].id')
          for id in $IDS; do
            echo "Deleting artifact $id"
            gh api -X DELETE \
              "repos/${{ github.repository }}/actions/artifacts/$id" \
              || echo "  (already gone, ignoring)"
          done
