name: release-please

# Watches `main` for Conventional Commits, opens a PR that bumps the
# version and updates CHANGELOG.md, and -- once that PR is merged --
# tags the new release and triggers the Windows .exe build.
#
# We keep the build inside the SAME workflow run (via workflow_call)
# rather than relying on the tag-push event chaining into release.yml.
# GitHub deliberately blocks default-token-created events from
# triggering downstream workflows, so without this we would have to
# rerun the build manually every time release-please cuts a release.
#
# Reference: https://github.com/googleapis/release-please-action

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name:        ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          # `python` automatically updates `pyproject.toml`'s version
          # and prepends to CHANGELOG.md (Keep-a-Changelog format).
          release-type: python
          # Conventional commits live on `main`; the action proposes a
          # PR like "chore(main): release 0.2.0" that, once merged,
          # tags the version.

  # When release-please cut a new release, build the Windows .exe
  # binaries by reusing the release workflow.  Running it as a
  # reusable workflow ("uses: ./...") keeps everything in the same
  # run, sidestepping the tag-push GITHUB_TOKEN restriction.
  build-binaries:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/release.yml
    permissions:
      contents: write
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
