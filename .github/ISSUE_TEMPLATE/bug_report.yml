name: Bug report
description: Report unexpected behaviour of the ramp optimiser.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill
        in as much of the form below as possible.
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the unexpected behaviour.
      placeholder: |
        I clicked Calculate and the GUI hung; the elapsed-time
        counter kept ticking but no blueprint was ever produced.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: |
        The blueprints should appear in the chosen output folder.
    validations:
      required: true
  - type: input
    id: rise
    attributes:
      label: Ramp rise (cm)
      placeholder: "136"
    validations:
      required: true
  - type: input
    id: run_length
    attributes:
      label: Ramp horizontal length / run (cm)
      placeholder: "540"
    validations:
      required: true
  - type: input
    id: car
    attributes:
      label: Car geometry
      description: Ground clearance, wheelbase, front and rear overhang in cm.
      placeholder: "clearance 14, wheelbase 269, front overhang 87, rear overhang 0"
    validations:
      required: true
  - type: textarea
    id: log
    attributes:
      label: Console log
      description: |
        Paste the full text shown in the GUI's "Calculation output"
        panel, or the terminal output if you used the CLI.
      render: text
  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of the program (release tag, or "main" + commit hash if you built from source)?
      placeholder: "v0.1.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 24H2"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python (only if you ran the .py file directly, not the .exe)
      placeholder: "Python 3.11.9"
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, generated blueprints, additional context.
